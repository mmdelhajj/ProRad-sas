version: '3.8'

# ProxPanel SaaS Platform - Docker Compose
# Deploy on: 139.162.153.201 (saas-test.proxrad.com)

services:
  # PostgreSQL 16 - Shared instance, schema-per-tenant
  db:
    image: postgres:16-alpine
    container_name: proxpanel-saas-db
    restart: always
    environment:
      POSTGRES_DB: proxpanel_saas
      POSTGRES_USER: proxpanel
      POSTGRES_PASSWORD: ${DB_PASSWORD:-SaaS-ProxPanel-2026!}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proxpanel -d proxpanel_saas"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
    command: >
      postgres
      -c max_connections=500
      -c shared_buffers=1GB
      -c effective_cache_size=3GB
      -c work_mem=16MB
      -c maintenance_work_mem=256MB
      -c wal_level=replica
      -c max_wal_senders=5
      -c log_min_duration_statement=1000

  # Redis 7 - Shared, key-prefixed by tenant
  redis:
    image: redis:7-alpine
    container_name: proxpanel-saas-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-SaaS-Redis-2026!} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - ./data/redis:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-SaaS-Redis-2026!}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # API Server - SaaS mode with tenant middleware
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        BUILD_MODE: dev
    container_name: proxpanel-saas-api
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - SAAS_MODE=true
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=proxpanel
      - DB_PASSWORD=${DB_PASSWORD:-SaaS-ProxPanel-2026!}
      - DB_NAME=proxpanel_saas
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-SaaS-Redis-2026!}
      - JWT_SECRET=${JWT_SECRET:-saas-jwt-secret-2026-change-me}
      - JWT_EXPIRE_HOURS=168
      - API_PORT=8080
      - RADIUS_SECRET=${RADIUS_SECRET:-saas-radius-secret}
      - SAAS_RADIUS_SECRET=${SAAS_RADIUS_SECRET:-ProxPanel-SaaS-2026}
      - SERVER_IP=${SERVER_IP:-139.162.153.201}
      - ADMIN_DB_SCHEMA=admin
      - SKIP_LICENSE=true
    ports:
      - "127.0.0.1:8080:8080"
    privileged: true
    pid: "host"
    volumes:
      - ./data/uploads:/app/uploads
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.5'

  # RADIUS Server - Tenant routing by NAS IP
  radius:
    build:
      context: ./backend
      dockerfile: Dockerfile.radius
      args:
        BUILD_MODE: dev
    container_name: proxpanel-saas-radius
    restart: always
    network_mode: host
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - SAAS_MODE=true
      - DB_HOST=127.0.0.1
      - DB_PORT=5432
      - DB_USER=proxpanel
      - DB_PASSWORD=${DB_PASSWORD:-SaaS-ProxPanel-2026!}
      - DB_NAME=proxpanel_saas
      - REDIS_HOST=127.0.0.1
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-SaaS-Redis-2026!}
      - RADIUS_SECRET=${RADIUS_SECRET:-saas-radius-secret}
      - SAAS_RADIUS_SECRET=${SAAS_RADIUS_SECRET:-ProxPanel-SaaS-2026}
      - SERVER_IP=${SERVER_IP:-139.162.153.201}
      - SKIP_LICENSE=true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'

  # Frontend - Nginx with wildcard subdomain routing
  frontend:
    image: nginx:alpine
    container_name: proxpanel-saas-frontend
    restart: always
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx-saas.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/ssl:/etc/ssl/proxpanel:ro
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

volumes:
  postgres_data:
  redis_data:
