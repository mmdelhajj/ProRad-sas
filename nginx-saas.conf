# ProxPanel SaaS - Nginx Configuration
# Handles wildcard subdomain routing for tenants

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# Upstream API
upstream api_backend {
    server proxpanel-saas-api:8080;
    keepalive 32;
}

# HTTP → HTTPS redirect (when SSL is configured)
# server {
#     listen 80;
#     server_name *.saas.proxrad.com saas.proxrad.com;
#     return 301 https://$host$request_uri;
# }

# Main server block - handles *.saas.proxrad.com
server {
    listen 80;
    server_name *.saas.proxrad.com saas.proxrad.com;

    # SSL (uncomment when certificates are ready)
    # listen 443 ssl;
    # ssl_certificate /etc/ssl/proxpanel/fullchain.pem;
    # ssl_certificate_key /etc/ssl/proxpanel/privkey.pem;

    server_tokens off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API proxy
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Large uploads (backups)
        client_max_body_size 600m;
    }

    # Login rate limiting
    location /api/auth/login {
        limit_req zone=login burst=3 nodelay;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Uploads
    location /uploads/ {
        alias /usr/share/nginx/html/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Block sensitive files
    location ~ /\. { deny all; }
    location ~* \.(env|bak|backup|old|sql|log)$ { deny all; }

    # index.html - NO CACHE (ensures users get latest version)
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires -1;
    }

    # Static assets - long cache (hashed filenames)
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Frontend SPA fallback
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
